apiVersion: apps/v1
kind: ReplicaSet
metadata: 
 name: sample-replica
 labels: 
   project: learn-replica
   environment: learn
spec:
   replicas: 2
   selector:
    matchLabels:
     project: learn-replica 
   template:
    metadata: 
      labels: 
       project: learn-replica 
    spec: 
     containers:
      - name : nginx
        image: nginx:1.24
        ports:
         - containerPort: 80     